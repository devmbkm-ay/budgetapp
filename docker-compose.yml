services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mysecretpassword
      - POSTGRES_DB=budget_db
    volumes:
      - budget_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  api:
    build:
      context: .
      target: api # Désormais supporté par la version 3.8
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=3001
    depends_on:
      - db
    restart: always

  web:
    build:
      context: .
      target: web
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:3001
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api
      - AUTH_SECRET=${AUTH_SECRET}
    depends_on:
      - api
    restart: always

volumes:
  budget_db_data:
